<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YT Trading Desk — Chains of Brains</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#070b12;
  --panel:#0d1321;
  --panel2:#111827;
  --border:#1c2a3e;
  --border2:#243044;
  --text:#d1dae8;
  --muted:#4a5a72;
  --dim:#2a3a54;
  --green:#00e676;
  --green-dim:#00e67622;
  --red:#ff3d57;
  --red-dim:#ff3d5722;
  --cyan:#00bfff;
  --cyan-dim:#00bfff18;
  --gold:#f0b429;
  --purple:#a78bfa;
  --mono:'SF Mono','Fira Code','Consolas','Courier New',monospace;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;
  line-height:1.4;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── TICKER BAR ── */
.ticker-bar{
  background:#080d18;
  border-bottom:1px solid var(--border);
  height:32px;
  display:flex;
  align-items:center;
  overflow:hidden;
  position:relative;
}
.ticker-bar::before,.ticker-bar::after{
  content:'';position:absolute;top:0;width:60px;height:100%;z-index:2;
}
.ticker-bar::before{left:0;background:linear-gradient(90deg,#080d18,transparent)}
.ticker-bar::after{right:0;background:linear-gradient(-90deg,#080d18,transparent)}
.ticker-track{
  display:flex;gap:40px;
  animation:ticker 30s linear infinite;
  white-space:nowrap;padding:0 20px;
}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{
  font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:8px;
}
.ticker-label{color:var(--muted)}
.ticker-val{color:var(--text);font-weight:600}
.ticker-chg{font-size:10px;padding:1px 5px;border-radius:3px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.up-bg{background:var(--green-dim);color:var(--green)}
.down-bg{background:var(--red-dim);color:var(--red)}

/* ── HEADER ── */
header{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.3px}
.logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logo-text{color:var(--text)}
.logo-sub{color:var(--muted);font-size:11px;font-weight:400;margin-left:4px}
.header-right{display:flex;align-items:center;gap:20px}
.clock{font-family:var(--mono);font-size:12px;color:var(--cyan)}
.update-badge{
  font-size:11px;color:var(--muted);
  background:var(--panel2);border:1px solid var(--border);
  padding:4px 10px;border-radius:4px;
}
.update-badge span{color:var(--text)}

/* ── LAYOUT ── */
main{padding:20px 24px;max-width:1600px;margin:0 auto}

/* ── PORTFOLIO BAR ── */
.portfolio-bar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:1px;background:var(--border);
  border:1px solid var(--border);border-radius:8px;
  overflow:hidden;margin-bottom:20px;
}
.p-stat{
  background:var(--panel);padding:14px 18px;
}
.p-stat .p-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.p-stat .p-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--cyan);line-height:1}
.p-stat .p-change{font-size:11px;margin-top:4px}

/* ── CHANNEL BLOCK ── */
.channel-block{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:20px;
}

.ch-header{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;border-bottom:1px solid var(--border);
  background:var(--panel2);
}
.ch-avatar{
  width:40px;height:40px;border-radius:50%;
  background:var(--dim);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;color:var(--cyan);overflow:hidden;flex-shrink:0;
}
.ch-avatar img{width:100%;height:100%;object-fit:cover}
.ch-name{font-size:15px;font-weight:700;color:var(--text)}
.ch-handle{font-size:11px;color:var(--muted);font-family:var(--mono)}
.ch-id{
  margin-left:auto;font-size:10px;font-family:var(--mono);
  color:var(--muted);background:var(--dim);
  padding:3px 8px;border-radius:3px;
}

/* ── METRICS ROW ── */
.metrics-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:1px;background:var(--border);border-bottom:1px solid var(--border);
}
.metric{background:var(--panel);padding:16px 18px}
.metric .m-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted);margin-bottom:8px;
}
.metric .m-val{
  font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;
  color:var(--text);
}
.metric .m-val.g{color:var(--green)}
.metric .m-val.c{color:var(--cyan)}
.metric .m-val.p{color:var(--purple)}
.metric .m-change{
  font-size:11px;font-family:var(--mono);margin-top:6px;
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:3px;
}

/* ── CHARTS GRID ── */
.charts-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--border);border-bottom:1px solid var(--border);
}
.chart-panel{background:var(--panel);padding:16px 20px}
.chart-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin-bottom:12px;display:flex;
  align-items:center;justify-content:space-between;
}
.chart-label span{font-family:var(--mono);color:var(--text);font-size:13px;text-transform:none;letter-spacing:0}
.chart-wrap{height:110px;position:relative}

/* ── VIDEO PILLS ── */
.videos-row{
  padding:16px 20px;display:flex;flex-wrap:wrap;gap:10px;
}
.vid-pill{
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:6px;padding:10px 14px;
  display:flex;flex-direction:column;gap:5px;
  min-width:200px;flex:1;max-width:260px;
  cursor:pointer;transition:border-color .15s;
  text-decoration:none;color:inherit;
}
.vid-pill:hover{border-color:var(--cyan)}
.vid-thumb{
  width:100%;aspect-ratio:16/9;border-radius:4px;
  background:var(--dim);object-fit:cover;margin-bottom:6px;
}
.vid-title{
  font-size:12px;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;
}
.vid-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.vid-views{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--cyan)}
.vid-likes{font-family:var(--mono);font-size:11px;color:var(--muted)}
.vid-date{font-size:10px;color:var(--muted)}

/* ── EMPTY / LOADING ── */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px;gap:16px;color:var(--muted);
}
.ring{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--dim);border-top-color:var(--cyan);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.no-data{
  text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;
}
.no-data code{
  display:inline-block;margin-top:12px;padding:8px 16px;
  background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  font-family:var(--mono);font-size:12px;color:var(--cyan);
}

/* ── VIEW TOGGLE ── */
.view-toggle{
  display:flex;background:var(--panel2);
  border:1px solid var(--border);border-radius:6px;overflow:hidden;
}
.vt-btn{
  padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--muted);
  transition:color .15s,background .15s;letter-spacing:.3px;
}
.vt-btn.active{background:var(--dim);color:var(--cyan)}
.vt-btn:hover:not(.active){color:var(--text)}

/* ── TABLE VIEW ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--panel2)}
th{
  padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;
  letter-spacing:.7px;color:var(--muted);font-weight:600;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
th.r,td.r{text-align:right}
tbody tr{background:var(--panel);transition:background .1s}
tbody tr:hover{background:var(--panel2)}
tbody tr+tr{border-top:1px solid var(--border)}
td{padding:10px 14px;color:var(--text);vertical-align:middle}
.tbl-ch-row td{
  background:var(--panel2);font-weight:700;
  border-top:2px solid var(--border);border-bottom:1px solid var(--border);
}
.tbl-ch-name{display:flex;align-items:center;gap:10px}
.tbl-avatar{
  width:28px;height:28px;border-radius:50%;background:var(--dim);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--cyan);overflow:hidden;flex-shrink:0;
}
.tbl-avatar img{width:100%;height:100%;object-fit:cover}
.mono{font-family:var(--mono)}
.g{color:var(--green)}.c{color:var(--cyan)}.p{color:var(--purple)}
.tbl-badge{
  font-size:10px;padding:2px 7px;border-radius:3px;
  font-family:var(--mono);white-space:nowrap;
}
.tbl-badge.up{background:var(--green-dim);color:var(--green)}
.tbl-badge.dn{background:var(--red-dim);color:var(--red)}
.tbl-badge.fl{background:var(--dim);color:var(--muted)}
.vid-link{color:var(--text);text-decoration:none;display:-webkit-box;
  -webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.vid-link:hover{color:var(--cyan)}

footer{
  text-align:center;padding:24px;color:var(--muted);font-size:11px;
  border-top:1px solid var(--border);margin-top:8px;
}
footer a{color:var(--cyan);text-decoration:none}

@media(max-width:640px){
  .charts-grid{grid-template-columns:1fr}
  .videos-row{flex-direction:column}
  .vid-pill{max-width:100%}
}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-bar">
  <div class="ticker-track" id="ticker-track">
    <div class="ticker-item"><span class="ticker-label">loading</span></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">YT Trading Desk</span>
    <span class="logo-sub">/ Chains of Brains</span>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="vt-btn active" id="btn-trading" onclick="setView('trading')">📈 Trading</button>
      <button class="vt-btn" id="btn-tabla" onclick="setView('tabla')">☰ Tabla</button>
    </div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="update-badge">Updated <span id="last-updated">—</span></div>
  </div>
</header>

<main id="main">
  <div class="loading-wrap">
    <div class="ring"></div>
    <span>Connecting to data feed...</span>
  </div>
</main>

<footer>
  Powered by <a href="https://chainsofbrains.com">Chains of Brains</a>
  &nbsp;·&nbsp; Refresh: <code style="background:var(--panel2);padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:11px;color:var(--cyan)">python3 ~/clipflow/yt-dashboard/refresh_data.py</code>
</footer>

<script>
/* ── Utilities ── */
const fmt = n => {
  n = Number(n||0);
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
};
const pctHtml = (v, invert=false) => {
  if(v===null||v===undefined) return '<span class="flat">—</span>';
  const up = invert ? v<0 : v>=0;
  const cls = up ? 'up-bg' : 'down-bg';
  const arrow = up ? '▲' : '▼';
  return `<span class="m-change ${cls}">${arrow} ${Math.abs(v)}%</span>`;
};
const chgHtml = (v) => {
  if(v===null||v===undefined) return '<span class="flat">—</span>';
  const up = v>=0;
  return `<span class="${up?'up':'down'}">${up?'+':''}${v}%</span>`;
};

/* ── Clock ── */
function startClock(){
  const el = document.getElementById('clock');
  const tick = () => {
    el.textContent = new Date().toLocaleTimeString('en-US',{hour12:false});
  };
  tick(); setInterval(tick,1000);
}

/* ── Chart factory ── */
function makeChart(id, labels, data, color){
  const ctx = document.getElementById(id);
  if(!ctx) return;
  const max = Math.max(...data,1);
  const hasData = data.some(v=>v>0);
  const gradient = ctx.getContext('2d').createLinearGradient(0,0,0,110);
  gradient.addColorStop(0, color+'44');
  gradient.addColorStop(1, color+'00');

  new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        data,
        borderColor: hasData ? color : '#2a3a54',
        borderWidth:2,
        pointRadius:0,
        pointHoverRadius:4,
        fill:true,
        backgroundColor: hasData ? gradient : 'transparent',
        tension:.4,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:600},
      plugins:{legend:{display:false},tooltip:{
        mode:'index',intersect:false,
        backgroundColor:'#0d1321',
        borderColor:'#1c2a3e',borderWidth:1,
        titleColor:'#4a5a72',bodyColor:'#d1dae8',
        callbacks:{label:ctx=>' '+fmt(ctx.raw)}
      }},
      scales:{
        x:{display:false},
        y:{
          display:false,min:0,
          suggestedMax: max===0 ? 10 : max*1.15,
        }
      }
    }
  });
}

/* ── Ticker builder ── */
function buildTicker(channels){
  const items = [];
  channels.forEach(ch=>{
    const vp = ch.views_pct;
    const chgClass = vp===null?'flat':vp>=0?'up':'down';
    const chgStr  = vp===null?'—':(vp>=0?'+':'')+vp+'%';
    items.push(`
      <div class="ticker-item">
        <span class="ticker-label">${ch.title}</span>
        <span class="ticker-val">${fmt(ch.total_views)} views</span>
        <span class="ticker-chg ${chgClass}">${chgStr} 28d</span>
      </div>
      <div class="ticker-item">
        <span class="ticker-label">SUBS</span>
        <span class="ticker-val">${fmt(ch.subscribers)}</span>
      </div>`);
  });
  // duplicate for infinite scroll
  const full = items.join('')+items.join('');
  const track = document.getElementById('ticker-track');
  track.innerHTML = full;
}

/* ── Portfolio bar ── */
function buildPortfolio(channels){
  const totalSubs  = channels.reduce((s,c)=>s+(c.subscribers||0),0);
  const totalViews = channels.reduce((s,c)=>s+(c.total_views||0),0);
  const total28d   = channels.reduce((s,c)=>s+(c.views_28d||0),0);
  const totalSubs28d = channels.reduce((s,c)=>s+(c.subs_gained_28d||0),0);
  const totalVideos = channels.reduce((s,c)=>s+(c.video_count||0),0);
  return `
  <div class="portfolio-bar">
    <div class="p-stat">
      <div class="p-label">Channels</div>
      <div class="p-val">${channels.length}</div>
    </div>
    <div class="p-stat">
      <div class="p-label">Total Subscribers</div>
      <div class="p-val">${fmt(totalSubs)}</div>
    </div>
    <div class="p-stat">
      <div class="p-label">Total Views</div>
      <div class="p-val">${fmt(totalViews)}</div>
    </div>
    <div class="p-stat">
      <div class="p-label">Views · 28d</div>
      <div class="p-val" style="color:var(--green)">${fmt(total28d)}</div>
    </div>
    <div class="p-stat">
      <div class="p-label">New Subs · 28d</div>
      <div class="p-val" style="color:var(--purple)">${fmt(totalSubs28d)}</div>
    </div>
    <div class="p-stat">
      <div class="p-label">Videos</div>
      <div class="p-val">${fmt(totalVideos)}</div>
    </div>
  </div>`;
}

/* ── Channel block ── */
function buildChannel(ch, idx){
  const av = ch.thumbnail
    ? `<img src="${ch.thumbnail}" alt="">`
    : (ch.title||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  const viewsColor = (ch.views_28d||0) > 0 ? 'var(--green)' : 'var(--cyan)';

  // Video pills
  const pills = (ch.recent_videos||[]).slice(0,6).map(v=>{
    const thumb = v.thumbnail
      ? `<img class="vid-thumb" src="${v.thumbnail}" alt="">`
      : `<div class="vid-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--muted)">▶</div>`;
    return `
    <a class="vid-pill" href="https://youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
      ${thumb}
      <div class="vid-title">${v.title||'—'}</div>
      <div class="vid-meta">
        <span class="vid-views">▶ ${fmt(v.views)}</span>
        <span class="vid-likes">♥ ${fmt(v.likes)}</span>
      </div>
      <div class="vid-date">${v.published_at||''}</div>
    </a>`;
  }).join('');

  return `
  <div class="channel-block">
    <div class="ch-header">
      <div class="ch-avatar">${av}</div>
      <div>
        <div class="ch-name">${ch.title||'—'}</div>
        <div class="ch-handle">${ch.handle||''}</div>
      </div>
      <div class="ch-id">${ch.id||''}</div>
    </div>

    <div class="metrics-row">
      <div class="metric">
        <div class="m-label">Subscribers</div>
        <div class="m-val c">${fmt(ch.subscribers)}</div>
        ${pctHtml(ch.subs_pct)}
      </div>
      <div class="metric">
        <div class="m-label">Total Views</div>
        <div class="m-val">${fmt(ch.total_views)}</div>
      </div>
      <div class="metric">
        <div class="m-label">Views · 28d</div>
        <div class="m-val g">${fmt(ch.views_28d)}</div>
        ${pctHtml(ch.views_pct)}
      </div>
      <div class="metric">
        <div class="m-label">Watch Time · 28d</div>
        <div class="m-val">${fmt(ch.minutes_28d)}<span style="font-size:13px;color:var(--muted)"> min</span></div>
      </div>
      <div class="metric">
        <div class="m-label">New Subs · 28d</div>
        <div class="m-val p">${fmt(ch.subs_gained_28d)}</div>
      </div>
      <div class="metric">
        <div class="m-label">Videos</div>
        <div class="m-val">${fmt(ch.video_count)}</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-panel">
        <div class="chart-label">
          Daily Views · 30d
          <span>${fmt(ch.views_28d)} total</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-views-${idx}"></canvas>
        </div>
      </div>
      <div class="chart-panel">
        <div class="chart-label">
          Daily New Subs · 30d
          <span>${fmt(ch.subs_gained_28d)} gained</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-subs-${idx}"></canvas>
        </div>
      </div>
    </div>

    ${pills ? `<div class="videos-row">${pills}</div>` : ''}
  </div>`;
}

/* ── Table view ── */
function badge(v){
  if(v===null||v===undefined) return '<span class="tbl-badge fl">—</span>';
  const up=v>=0;
  return `<span class="tbl-badge ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(v)}%</span>`;
}

function buildTableView(channels){
  const rows = channels.map(ch=>{
    const av = ch.thumbnail
      ? `<img src="${ch.thumbnail}" alt="">`
      : (ch.title||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

    const videoRows = (ch.recent_videos||[]).slice(0,6).map(v=>`
      <tr>
        <td><a class="vid-link" href="https://youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">${v.title||'—'}</a></td>
        <td class="r mono c">${fmt(v.views)}</td>
        <td class="r mono">${fmt(v.likes)}</td>
        <td class="r mono" style="color:var(--muted)">${v.duration||'—'}</td>
        <td class="r" style="color:var(--muted);font-size:11px">${v.published_at||'—'}</td>
        <td class="r"></td><td class="r"></td>
      </tr>`).join('');

    return `
      <tr class="tbl-ch-row">
        <td colspan="7">
          <div class="tbl-ch-name">
            <div class="tbl-avatar">${av}</div>
            <span>${ch.title||'—'}</span>
            <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${ch.handle||''}</span>
          </div>
        </td>
      </tr>
      <tr>
        <td style="color:var(--muted);font-size:11px;padding-left:20px">Channel totals</td>
        <td class="r mono c">${fmt(ch.total_views)}</td>
        <td class="r mono">${fmt(ch.subscribers)}</td>
        <td class="r mono g">${fmt(ch.views_28d)}</td>
        <td class="r">${badge(ch.views_pct)}</td>
        <td class="r mono p">${fmt(ch.subs_gained_28d)}</td>
        <td class="r">${badge(ch.subs_pct)}</td>
      </tr>
      ${videoRows}`;
  }).join('');

  return `
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Video / Channel</th>
          <th class="r">Views</th>
          <th class="r">Likes / Subs</th>
          <th class="r">Views 28d / Duration</th>
          <th class="r">Δ Views</th>
          <th class="r">Subs 28d</th>
          <th class="r">Δ Subs</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ── View switcher ── */
let _channels = [];
let _chartsRendered = false;

function setView(v){
  localStorage.setItem('yt-dash-view', v);
  document.getElementById('btn-trading').classList.toggle('active', v==='trading');
  document.getElementById('btn-tabla').classList.toggle('active',   v==='tabla');

  const main = document.getElementById('main');
  const portfolio = buildPortfolio(_channels);

  if(v==='trading'){
    _chartsRendered = false;
    let html = portfolio;
    _channels.forEach((ch,i)=>{ html += buildChannel(ch,i); });
    main.innerHTML = html;
    _channels.forEach((ch,i)=>{
      const labels = ch.labels||[];
      const views  = ch.views_series||[];
      const subs   = ch.subs_series||[];
      makeChart(`chart-views-${i}`, labels, views, views.some(v=>v>0)?'#00e676':'#2a3a54');
      makeChart(`chart-subs-${i}`,  labels, subs,  '#a78bfa');
    });
  } else {
    main.innerHTML = portfolio + buildTableView(_channels);
  }
}

/* ── Main render ── */
async function init(){
  startClock();
  try{
    const resp = await fetch('data.json?t='+Date.now());
    const data = await resp.json();

    document.getElementById('last-updated').textContent = data.last_updated||'—';
    _channels = data.channels||[];

    const main = document.getElementById('main');
    if(!_channels.length){
      main.innerHTML = `
        <div class="no-data">
          No data yet.<br>
          <code>python3 ~/clipflow/yt-dashboard/refresh_data.py</code>
        </div>`;
      return;
    }

    buildTicker(_channels);

    // Restore saved view preference
    const saved = localStorage.getItem('yt-dash-view')||'trading';
    setView(saved);

  }catch(e){
    document.getElementById('main').innerHTML = `
      <div class="no-data">Error: ${e.message}</div>`;
  }
}

init();
</script>
